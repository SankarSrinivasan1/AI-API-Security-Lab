rules:
  - id: api-key-hardcoded
    pattern-regex: "(api[_-]?key\s*=\s*['\"][A-Za-z0-9-_]{16,}['\"])"
    message: "Possible hardcoded API key"
    severity: ERROR
    languages: [python, javascript]

  - id: openai-key-exposure
    pattern-regex: "(sk-[A-Za-z0-9]{20,})"
    message: "Potential OpenAI-style API key exposure"
    severity: ERROR
    languages: [python, javascript]

  - id: env-key-logged
    pattern: log($ENV)
    message: "Environment variable might be logged"
    severity: WARNING
    languages: [python, javascript]

  - id: secret-in-url
    pattern-regex: "(https?:\/\/.*(api_key|token)=)"
    message: "API key exposed in URL"
    severity: ERROR
    languages: [python, javascript]
